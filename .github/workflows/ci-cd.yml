# CI/CD Pipeline — runs on every push to main
#
# Flow:
#   1. build-and-push  → compiles the JAR, builds a Docker image, pushes to GHCR
#   2. deploy          → authenticates to GCP and deploys the new image to GKE
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID    — your GCP project ID 
#   GCP_SA_KEY        — JSON key of a GCP Service Account
#   GKE_CLUSTER_NAME  — cloud-app-cluster
#   GKE_CLUSTER_ZONE  — europe-west1
#
# How to create GCP_SA_KEY:
#   1. GCP Console → IAM & Admin → Service Accounts → Create Service Account
#   2. Name: github-actions
#   3. Grant role: "Kubernetes Engine Developer"
#   4. Click the account → Keys tab → Add Key → JSON → Download
#   5. Open the downloaded file, copy ALL contents, paste as GCP_SA_KEY secret
#
# GITHUB_TOKEN is injected automatically — no setup needed for GHCR.

name: CI/CD — Build, Push, Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── Job 1: Run tests against a real PostgreSQL database ─────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # GitHub spins up a real PostgreSQL container for the duration of this job.
    # Tests run against it exactly like production — no fake/mock database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudapp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cloudapp
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # ── Job 2: Build JAR → build Docker image → push to GHCR ────────────────────
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test   # only runs if all tests passed
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with both :latest and the exact commit SHA.
          # The SHA tag is used in the deploy step so each deployment
          # is tied to a specific, immutable git commit.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Job 3: Deploy to GKE ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push   # only runs if build-and-push succeeded

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials for kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          # Create secrets from GitHub Secrets — passwords never stored in git
          kubectl create secret generic cloud-app-secret \
            --from-literal=DB_USER=postgres \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --namespace=cloud-app \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_USER=postgres \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=POSTGRES_DB=cloudapp \
            --namespace=cloud-app \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/postgres/postgres-statefulset.yaml
          kubectl apply -f k8s/postgres/postgres-service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update app image to new commit SHA
        # Uses the exact commit SHA tag — not :latest — so the rollout is
        # deterministic and can be rolled back to this specific version.
        run: |
          kubectl set image deployment/cloud-app \
            cloud-app=${{ env.IMAGE }}:${{ github.sha }} \
            -n cloud-app

      - name: Wait for rollout to complete
        # Blocks until all pods running the new image pass their readiness probe.
        # If any pod fails, this step fails and the pipeline is marked as failed.
        run: |
          kubectl rollout status deployment/cloud-app \
            -n cloud-app \
            --timeout=300s
