# LoadBalancer type tells the cloud provider to provision a public IP address
# and route external traffic directly to this service — no domain needed.
# After applying, run:
#   kubectl get svc cloud-app-service -n cloud-app
# and use the EXTERNAL-IP shown in the output to access the app.
apiVersion: v1
kind: Service
metadata:
  name: cloud-app-service
  namespace: cloud-app
  labels:
    app: cloud-app
spec:
  type: LoadBalancer
  selector:
    app: cloud-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
