spring.application.name=cloud-app

# Database - values read from environment variables (with local defaults)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cloudapp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator - expose health + prometheus endpoints
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
